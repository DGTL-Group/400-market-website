name: Post-Deploy Cache Purge

# Runs after CI passes on main — Hostinger auto-deploys from GitHub,
# so this workflow waits for the deploy to propagate, then purges cache.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  purge:
    name: Purge caches
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      # ── Wait for Hostinger deploy to finish ──
      # Hostinger auto-deploys on push; give it time to pull + rebuild.
      - name: Wait for Hostinger deploy
        run: |
          DELAY="${DEPLOY_WAIT_SECONDS:-90}"
          echo "Waiting ${DELAY}s for Hostinger auto-deploy to complete..."
          sleep "$DELAY"

      # ── Purge .next/cache via SSH ──
      - name: Clear Next.js cache via SSH
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          SITE_PATH: ${{ secrets.HOSTINGER_SITE_PATH || '' }}
        run: |
          set -euo pipefail

          # Validate required secrets
          missing=()
          [ -z "${SSH_HOST:-}" ] && missing+=("HOSTINGER_SSH_HOST")
          [ -z "${SSH_USER:-}" ] && missing+=("HOSTINGER_SSH_USER")
          [ -z "${SSH_KEY:-}"  ] && missing+=("HOSTINGER_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add these in GitHub > Settings > Secrets and variables > Actions"
            exit 1
          fi

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/hostinger_key -p ${SSH_PORT}"

          # Run purge script with retries
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "==> SSH attempt $attempt/$MAX_RETRIES"
            if ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" "bash -s -- ${SITE_PATH}" < scripts/purge-cache.sh; then
              echo "==> Cache purge succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "::error::Cache purge failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "    Retrying in 10s..."
            sleep 10
          done

          # Clean up
          rm -f ~/.ssh/hostinger_key

      # ── CDN purge (not automated — Hostinger has no API) ──
      - name: CDN cache purge status
        if: always()
        run: |
          echo "::warning::Hostinger CDN cache purge is NOT automated."
          echo ""
          echo "Hostinger does not provide an API, webhook, or CLI for CDN"
          echo "cache purging. The only supported method is manual:"
          echo ""
          echo "  1. Log in to hPanel (hpanel.hostinger.com)"
          echo "  2. Go to Websites > your site > Dashboard"
          echo "  3. Search for 'CDN'"
          echo "  4. Click 'Flush cache'"
          echo ""
          echo "Alternatively, use the Cache Manager:"
          echo "  Dashboard > Cache Manager > Purge All"
          echo ""
          echo "If you need automated CDN purge, consider placing"
          echo "Cloudflare in front of the site (Cloudflare has a purge API)."
          echo ""
          echo "Sources:"
          echo "  https://www.hostinger.com/support/1583501-how-to-clear-cache-in-hostinger/"
          echo "  https://developers.hostinger.com/ (no cache endpoints exist)"
