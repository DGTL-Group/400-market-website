name: Post-Deploy Cache Purge

# Runs after CI passes on main — Hostinger auto-deploys from GitHub,
# so this workflow waits for the deploy to propagate, then purges cache.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  purge:
    name: Purge caches
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      # ── Check if SSH secrets are configured ──
      - name: Check SSH secrets
        id: secrets
        env:
          HAS_HOST: ${{ secrets.HOSTINGER_SSH_HOST != '' }}
          HAS_USER: ${{ secrets.HOSTINGER_SSH_USER != '' }}
          HAS_PASS: ${{ secrets.HOSTINGER_SSH_PASS != '' }}
        run: |
          if [ "$HAS_HOST" = "true" ] && [ "$HAS_USER" = "true" ] && [ "$HAS_PASS" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "SSH secrets are configured"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SSH secrets not configured — skipping cache purge."
            echo "To enable, add HOSTINGER_SSH_HOST, HOSTINGER_SSH_USER, and HOSTINGER_SSH_PASS in GitHub > Settings > Secrets."
          fi

      # ── Wait for Hostinger deploy to finish ──
      - name: Wait for Hostinger deploy
        if: steps.secrets.outputs.configured == 'true'
        run: |
          DELAY="${DEPLOY_WAIT_SECONDS:-90}"
          echo "Waiting ${DELAY}s for Hostinger auto-deploy to complete..."
          sleep "$DELAY"

      # ── Purge .next/cache via SSH ──
      - name: Clear Next.js cache via SSH
        if: steps.secrets.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SITE_PATH: ${{ secrets.HOSTINGER_SITE_PATH }}
        run: |
          set -euo pipefail

          sudo apt-get install -yqq sshpass > /dev/null 2>&1

          PORT="${SSH_PORT:-65002}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${PORT}"

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "==> SSH attempt $attempt/$MAX_RETRIES"
            if sshpass -p "$SSH_PASS" ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" "bash -s -- ${SITE_PATH:-}" < scripts/purge-cache.sh; then
              echo "==> Cache purge succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "::warning::Cache purge failed after $MAX_RETRIES attempts — deploy is fine, cache will refresh naturally."
              break
            fi
            echo "    Retrying in 10s..."
            sleep 10
          done

      # ── CDN purge reminder ──
      - name: CDN cache purge reminder
        if: always()
        run: |
          echo "::notice::Hostinger CDN cache must be purged manually: hPanel > Dashboard > CDN > Flush cache"
